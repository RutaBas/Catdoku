<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catdoku</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Catdoku">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
  <section id="start-screen">
    <div id="start-header">
      <span class="header-spacer" aria-hidden="true"></span>
      <h1>Catdoku</h1>
      <button id="settings-btn" class="icon-btn" type="button" aria-label="Settings">⚙️</button>
    </div>
    <p class="tagline">One cat per row, column, and territory.</p>
    <p class="how-to">
      <span>Tap or <strong>swipe</strong> to rule cells out</span>
      <span><strong>Double-tap</strong> to place a cat</span>
      <span>3 mistakes and the cats get away</span>
    </p>
    <div id="continue-row" hidden>
      <button id="continue-btn" class="btn btn-primary" type="button">Continue</button>
    </div>
    <div id="difficulty-list"></div>
  </section>

  <section id="game-screen" hidden>
    <header id="game-header">
      <button id="back-btn" class="icon-btn" type="button" aria-label="Back to menu">&larr;</button>
      <div id="difficulty-label"></div>
      <div id="lives" role="status" aria-label="Mistakes remaining"></div>
      <div id="stats">
        <span id="timer">0:00</span>
        <span id="move-count">0 moves</span>
      </div>
    </header>

    <div id="hint-message" hidden></div>

    <div id="board-wrap">
      <div id="board" role="grid"></div>
    </div>

    <footer id="controls">
      <button id="undo-btn" class="btn" type="button">Undo</button>
      <button id="clear-btn" class="btn" type="button">Clear</button>
      <button id="restart-btn" class="btn" type="button">Restart</button>
      <button id="hint-btn" class="btn" type="button">Hint</button>
    </footer>
  </section>

  <div id="result-overlay" class="overlay" hidden>
    <div id="confetti-layer" aria-hidden="true"></div>
    <div id="result-panel" role="dialog" aria-modal="true" aria-labelledby="result-message">
      <!-- Two pieces of card art, only ever one visible: the win video and the
           still. The still covers losses, and also stands in for the video if
           autoplay is refused or the file won't decode — see showResultMedia().
           `muted` is not a preference here, it's the price of autoplay: every
           mobile browser blocks sound-on autoplay outright. The win jingle is
           playWinSound()'s job, so the track is stripped from the file. -->
      <video id="result-video" src="media/you_win.mp4" poster="media/you_win_poster.jpg"
             muted playsinline preload="auto" disablepictureinpicture hidden></video>
      <img id="result-img" src="" alt="">
      <p id="result-message"></p>
      <p id="result-stats"></p>
      <div class="result-actions">
        <button id="result-secondary-btn" class="btn" type="button"></button>
        <button id="result-primary-btn" class="btn btn-primary" type="button"></button>
      </div>
    </div>
  </div>

  <div id="settings-overlay" class="overlay" hidden>
    <div id="settings-panel" class="panel" role="dialog" aria-label="Settings" aria-modal="true">
      <h2>Settings</h2>
      <label class="setting-row">
        <span>Dark mode</span>
        <input id="setting-dark-mode" type="checkbox">
      </label>
      <label class="setting-row">
        <span>Sound</span>
        <input id="setting-sound" type="checkbox">
      </label>
      <label class="setting-row">
        <span>Haptics</span>
        <input id="setting-haptics" type="checkbox">
      </label>
      <button id="settings-close-btn" class="btn btn-primary" type="button">Done</button>
    </div>
  </div>

  <div id="toast" role="status" aria-live="polite" hidden></div>
</div>

<script src="js/rng.js"></script>
<script src="js/board.js"></script>
<script src="js/solver.js"></script>
<script src="js/generator.js"></script>
<script src="js/puzzle-pool.js"></script>
<script src="js/pool.js"></script>
<script src="js/game.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
